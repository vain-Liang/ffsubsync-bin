name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - master

env:
  DIST_DIR: /tmp/builds

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Create virtual environment
        run: uv venv --python 3.13

      - name: Install dependencies
        run: uv pip install -r requirements.txt

      - name: Download ffmpeg binary
        run: |
          curl -L https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-full.7z -o resources/ffmpeg-release-full.7z
          mkdir -p resources/ffmpeg-bin
          7z e ffmpeg-8.0.1-full_build/bin/ffmpeg.exe ffmpeg-8.0.1-full_build/bin/ffprobe.exe -o/resources/ffmpeg-bin

      - name: Get site-package path
        run: |
          echo "SITE_PACKAGES=$(python -c 'import site; print(site.getsitepackages()[0])')" >> $GITHUB_ENV

      - name: Path for windows
        run: |
          rm -f "$SITE_PACKAGES/_pyinstaller_hooks_contrib/stdhooks/hook-webrtcvad.py"

      - name: Build executable
        run: pyinstaller --clean -y --dist ./dist/ffsubsync_bin build.spec

      - name: Move to DIST_DIR
        run: |
          mkdir -p $DIST_DIR
          mv dist/ffsubsync_bin/ffsubsync_bin.exe $DIST_DIR/ffsubsync_bin.exe

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-win11-ffsubsync_bin.exe
          path: ${{ env.DIST_DIR }}/*
          if-no-files-found: error
          retention-days: 1

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download builds
        uses: actions/download-artifact@v8
        with:
          path: ${{ env.DIST_DIR }}
          pattern: build-*
          merge-multiple: true

      # checksums.txt
      - name: Calculate checksums.txt
        run: |
          cd $DIST_DIR
          sha256sum * > checksums.txt

          # print checksums.txt
          cat checksums.txt

          FILES=$(find ${DIST_DIR} -type f -exec readlink -f {} \;)
          echo -e "RELEASE_FILES<<EOF" >> $GITHUB_ENV
          echo -e "$FILES" >> $GITHUB_ENV
          echo -e "EOF" >> $GITHUB_ENV

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: false
          files: ${{ env.RELEASE_FILES }}
          generate_release_notes: true
          draft: true
